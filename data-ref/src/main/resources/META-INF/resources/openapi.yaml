                              "type":"table",
                              "layout":{
                                "x":1,
                                "y":3,
                                "height":5,
                                "width":10
                              },
                              "options":{
                  
                              },
                              "resultSet":"rs1"
                            }
                          ]
                        },
                        {
                          "widgets":[
                            {
                              "type":"map",
                              "layout":{
                                "x":1,
                                "y":1,
                                "height":7,
                                "width":6
                              },
                              "options":{
                                "style":"osm-bright",
                                "fit":true,
