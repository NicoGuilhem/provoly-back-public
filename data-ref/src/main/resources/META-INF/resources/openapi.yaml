                                "width":3
                              },
                              "options":{
                                "style":"osm-bright",
                                "fit":true,
                                "layers":[
                                  {
                                    "type":"bubble",
                                    "locationAttribute":"location",
                                    "intensityAttribute":"integer",
                                    "radiusFactor":0.005
                                  }
                                ]
                              },
                              "resultSet":"rs1"
                            },
                            {
                              "type":"map",
                              "layout":{
                                "x":4,
                                "y":1,
                                "height":2,
                                "width":3
                              },
                              "options":{
                                "style":"osm-bright",
                                "fit":true,
                                "layers":[
                                  {
                                    "type":"heatmap",
                                    "locationAttribute":"location",
                                    "intensityAttribute":"integer",
                                    "intensityAsc":true
                                  }
                                ]
                              },
                              "resultSet":"rs1"
                            },
