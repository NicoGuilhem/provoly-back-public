openapi: 3.0.3
info:
  title: API Baseline
  description: CRUD Operation on repositories data
  version: 0.7.0
servers:
  - url: http://data-ref.provoly.com
paths:
  /about/version:
    get:
      tags:
        - Version Controller
      summary: Retrieve the application and chart versions
      operationId: com.provoly.version.VersionController_getVersion
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
              examples:
                default:
                  value: |
                    {
                      "applicationVersion": "0.4.8",
                      "chartVersion": "0.4.8"
                    }
        "404":
          $ref: '#/components/responses/notFoundException'
  /model/categories:
    put:
      tags:
        - Model Controller
      summary: Save a new category
      description: |
        They are used to categorise attributes of a data model. 
        If a category with this id already exists, update it.
      operationId: com.provoly.ref.model.ModelController_addCategory
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryDto'
      responses:
        "204":
          description: No Content
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "409":
          description: Conflict
      security:
        - oidc:
            - class_write
    get:
      tags:
        - Model Controller
      summary: Retrieve all categories
      operationId: com.provoly.ref.model.ModelController_getCategories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryDto'
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - class_read
            - search
            - datasource_read
  /model/categories/{id}:
    get:
      tags:
        - Model Controller
      summary: Retrieve a category based on its identifier
      operationId: com.provoly.ref.model.ModelController_getCategory
      parameters:
        - name: id
          in: path
          description: Category UUID
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDto'
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - class_read
    delete:
      tags:
        - Model Controller
      summary: Delete a category based on its identifier
      operationId: com.provoly.ref.model.ModelController_deleteCategory
      parameters:
        - name: id
          in: path
          description: UUID of the category
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "204":
          description: No Content
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
          content:
            application/json:
              examples:
                deleteDefaultCategory:
                  description: Occurs when you try to delete default category.
                  value: |
                    {
                      "application": "data-ref",
                      "code": "NOT_MODIFIABLE",
                      "message": "This is default category id. It can't be deleted"
                    }
      security:
        - oidc:
            - class_write
  /model/field:
    post:
      tags:
        - Model Controller
      summary: Save a new field
      description: |
        A field is required for defining an attribute in an oClass. 
        It can be used several times in the same oClass, or in different oClasses.
      operationId: com.provoly.ref.model.ModelController_addField
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FieldDto'
            examples:
              default:
                summary: Adding a field
                value: |
                  {
                    "id": "1d186f4a-5d75-4d2f-af45-d78180e0f0e8",
                    "name": "correct_field",
                    "type": "keyword"
                  }
              incorrect:
                summary: Adding an incorrect field (type unknown)
                value: |
                  {
                    "id": "1d186f4a-5d75-4d2f-af45-d78180e0f0e8",
                    "name": "incorrect_field",
                    "type": "char"
                  }
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
      security:
        - oidc:
            - field_write
  /model/fields:
    post:
      tags:
        - Model Controller
      summary: Save a new collection of fields
      operationId: com.provoly.ref.model.ModelController_addFields
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/FieldDto'
            examples:
              default:
                summary: Adding a collection of fields
                value: |
                  [
                    {
                      "id": "1d186f4a-5d75-4d2f-af45-d78180e0f0e8",
                      "name": "field_address",
                      "type": "string"
                    },
                    {
                      "id": "fcc51f53-9295-4caf-968e-873b601763b1",
                      "name": "field_code",
                      "type": "integer"
                    }
                  ]
      responses:
        "201":
          description: Created
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
      security:
        - oidc:
            - field_write
    get:
      tags:
        - Model Controller
      summary: Retrieve all existing fields
      operationId: com.provoly.ref.model.ModelController_getFields
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FieldDto'
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - field_read
            - search
            - datasource_read
  /model/fields/{id}:
    get:
      tags:
        - Model Controller
      summary: Retrieve a field based on its identifier
      operationId: com.provoly.ref.model.ModelController_getFieldById
      parameters:
        - name: id
          in: path
          description: Field UUID
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FieldDto'
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - field_read
            - item_write
    delete:
      tags:
        - Model Controller
      summary: Delete a field based on its identifier
      description: Deleting a field is only possible if it's not used in a oclass or named query.
      operationId: com.provoly.ref.model.ModelController_deleteFieldById
      parameters:
        - name: id
          in: path
          description: UUID of the field to delete
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "204":
          description: No Content
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
        "400":
          description: Bad Request
      security:
        - oidc:
            - field_read
            - item_write
            - search
            - datasource_read
  /model/fields/{id}/associations:
    get:
      tags:
        - Model Controller
      summary: Retrieve all field's associate items
      description: A field can be used in oClasses and named queries.
      operationId: com.provoly.ref.model.ModelController_getAssociationOfField
      parameters:
        - name: id
          in: path
          description: Field id
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                items:
                  $ref: '#/components/schemas/AssociationsDto'
              examples:
                default:
                  summary: Get associations of a field
                  value: |
                    {
                        "associations": [
                          {
                              "id": "423b5c01-1816-41d4-b358-100000000005",
                              "name": "Station de velos",
                              "type": "OCLASS"
                          },
                          {
                            "id": "423b5c01-1816-41d4-b358-100000000010",
                            "name": "Test named query",
                            "type": "NAMED_QUERY"
                          }
                        ],
                        "usedElsewhere": false
                    }

        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - field_read
            - field_write
  /model/fields/class/{id}:
    get:
      tags:
        - Model Controller
      summary: Retrieve all existing fields for an oClass
      operationId: com.provoly.ref.model.ModelController_getFieldsForClass
      parameters:
        - name: id
          in: path
          description: Class UUID
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FieldDto'
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - field_read
            - search
            - item_write
            - datasource_read
  /model/class:
    post:
      tags:
        - Model Controller
      summary: Save or update new oClass
      description: |
        An oClass is made up of attributes and is used to define the data model that will be inserted. 
        An attribute belongs to a single class, and can be grouped by category. OClass names must be unique 
        and attributes ids must be unique.
        If class with same id already exists, update it.
        Note: It's not possible to change fields.
      operationId: com.provoly.ref.model.ModelController_saveClass
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OClassWriteDto'
            examples:
              default:
                summary: Create "Accident" oClass
                description: |
                  With the \"car_id\" attribute able to have several values,
                  and \"date_accident\", \"location\" and \"weather\" that belong to same category.
                value: |
                  {
                    "id": "c3ffd8e7-e334-4710-aeb1-8506a12ad39c",
                    "name": "Accident",
                    "icon": "path/to/icon",
                    "attributes": [
                      {
                        "id": "7527bd0a-5059-4edd-a053-83189be6a920",
                        "name": "date_accident",
                        "technicalName": "date_accident",
                        "field": "872ff200-b4cc-47e6-a45b-fe3ea9c1ab9f",
                        "multiValued": false
                      },
                      {
                        "id": "430b3c66-d621-466a-9fa0-1f2e3ae3b15d",
                        "name": "location",
                        "technicalName": "location",
                        "field": "5510a2a9-dcbb-4861-bdb1-f0091a824767",
                        "category": "cf666d66-838f-4d92-a4d2-a315df21fac9",
                        "multiValued": false
                      },
                      {
                        "id": "24b31150-5acc-4f13-bf9f-3987abb32ffe",
                        "name": "weather",
                        "technicalName": "weather",
                        "field": "5510a2a9-dcbb-4861-bdb1-f0091a824767",
                        "category": "cf666d66-838f-4d92-a4d2-a315df21fac9",
                        "multiValued": false
                      },
                      {
                        "id": "4b8b4f6c-7dfd-4613-9414-c9daf00016af",
                        "name": "car_id",
                        "technicalName": "car_id",
                        "field": "7000506c-049b-47d3-b92d-a2e823b46b81",
                        "multiValued": true
                      }
                    ]
                  }
      responses:
        "201":
          description: created
        "400":
          description: Bad Request
          content:
            application/json:
              examples:
                missingTechnicalName:
                  description: Occurs when you try to create a class without technical name in attribute.
                  value: |
                    {
                      "application": "data-ref",
                      "code": "BAD_REQUEST",
                      "message": "Missing technical name in attribute 39257557-083b-4427-9493-1cedc92b25cf"
                    }
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
      security:
        - oidc:
            - class_write
    get:
      tags:
        - Model Controller
      summary: Retrieve all defined oClasses
      operationId: com.provoly.ref.model.ModelController_get
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OClassReadDto'
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - class_read
            - search
            - datasource_read
  /model/class/id/{id}:
    get:
      tags:
        - Model Controller
      summary: Retrieve an oClass based on its identifier
      operationId: com.provoly.ref.model.ModelController_getById
      parameters:
        - name: id
          in: path
          description: Class UUID
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OClassReadDto'
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - class_read
            - search
            - datasource_read
    delete:
      tags:
        - Model Controller
      summary: Delete an oClass based on its identifier
      description: |
        Delete a class is possible if not used elsewhere. Deleting a class means deleting the table that
        contained the data
      operationId: com.provoly.ref.model.ModelController_deleteClass
      parameters:
        - name: id
          in: path
          description: Class UUID
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - class_write
  /model/class/id/{id}/details:
    get:
      tags:
        - Model Controller
      summary: Retrieve an oClass based on its identifier with more details
      description: |
        This oClass contains more information about the attributes used in the oClass,
        with details of the associated fields.
      operationId: com.provoly.ref.model.ModelController_getDetails
      parameters:
        - name: id
          in: path
          description: Class UUID
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                items:
                  $ref: '#/components/schemas/OClassDetailsDto'
              examples:
                default:
                  summary: get detailed oClass of "Accident"
                  value: |
                    {
                      "id": "c3ffd8e7-e334-4710-aeb1-8506a12ad39c",
                      "slug": "7d2cda0aab_accident",
                      "name": "Accident",
                      "attributes": [
                        {
                          "oclass": "c3ffd8e7-e334-4710-aeb1-8506a12ad39c",
                          "id": "7527bd0a-5059-4edd-a053-83189be6a920",
                          "name": "date_accident",
                          "slug": "5e8c3edc5d_date_accident",
                          "multiValued": false,
                          "field": {
                            "id": "872ff200-b4cc-47e6-a45b-fe3ea9c1ab9f",
                            "name": "date",
                            "type": "instant",
                            "slug": "279ff1f102_date"
                          }
                        },
                        {
                          "oclass": "c3ffd8e7-e334-4710-aeb1-8506a12ad39c",
                          "id": "430b3c66-d621-466a-9fa0-1f2e3ae3b15d",
                          "name": "location",
                          "slug": "c7746c45c2_location",
                          "multiValued": false,
                          "field": {
                            "id": "5510a2a9-dcbb-4861-bdb1-f0091a824767",
                            "name": "string",
                            "type": "string",
                            "slug": "279ff1f103_string"
                          }
                        },
                        {
                          "oclass": "c3ffd8e7-e334-4710-aeb1-8506a12ad39c",
                          "id": "24b31150-5acc-4f13-bf9f-3987abb32ffe",
                          "name": "weather",
                          "slug": "b32bc15ba2_weather",
                          "multiValued": false,
                          "field": {
                            "id": "5510a2a9-dcbb-4861-bdb1-f0091a824767",
                            "name": "string",
                            "type": "string",
                            "slug": "279ff1f103_string"
                          }
                        },
                        {
                          "oclass": "c3ffd8e7-e334-4710-aeb1-8506a12ad39c",
                          "id": "4b8b4f6c-7dfd-4613-9414-c9daf00016af",
                          "name": "car_id",
                          "slug": "3c7587eddf_car_id",
                          "multiValued": true,
                          "field": {
                            "id": "6994ede1-7689-489f-8003-115e7cd4646b",
                            "name": "identifier",
                            "type": "string",
                            "slug": "279ff1f102_identifier"
                          }
                        }
                      ]
                    }
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - class_read
            - search
            - datasource_read
  /model/class/id/{id}/attribute:
    put:
      tags:
        - Model Controller
      summary: Save a new attribute to a class
      operationId: com.provoly.ref.model.ModelController_addAttribute
      parameters:
        - name: id
          in: path
          description: Class UUID
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttributeDefDto'
            examples:
              default:
                summary: Adding an attribute to a class
                value: |
                  {
                    "id": "ba681f33-fe70-42f8-a277-05c607ba29cf",
                    "name": "attribute_example",
                    "field": "423b5c01-1816-41d4-b358-200000000010",
                    "category": "991eb4b2-253c-4875-b708-8209fa5bfd51",
                    "multiValued": false
                  }
              incorrect:
                summary: Adding an incorrect attribute to a class (field ID unknown)
                value: |
                  {
                    "id": "423b5c01-1816-41d4-b358-200000000010",
                    "name": "attribute_example",
                    "field": "",
                    "category": "991eb4b2-253c-4875-b708-8209fa5bfd51",
                    "multiValued": false
                  }
      responses:
        "204":
          description: No Content
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - class_write
  /model/class/id/{classId}/attribute/id/{attributeId}:
    delete:
      tags:
        - Model Controller
      summary: Delete an attribute based on its identifier
      operationId: com.provoly.ref.model.ModelController_deleteAttribute
      parameters:
        - name: classId
          in: path
          description: UUID of the attribute's class
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
        - name: attributeId
          in: path
          description: UUID of the attribute to delete
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              examples:
                usedField:
                  description: Occurs when we try to delete an attribute used by a link, a namedquery or an abac rule.
                  value: |
                    {
                      "application": "data-ref",
                      "code": "BAD_REQUEST",
                      "message": "The attribute 423b5c01-1816-41d4-b358-100000000021 is used by one or more search(es) and abac rule(s), remove them to delete the attribute"
                    }
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - class_write
  /model/class/datasets/count:
    get:
      tags:
        - Model Controller
      operationId: com.provoly.ref.model.ModelController_getDatasetCountByClass
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CountDto'
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - class_read
  /model/class/field/{id}:
    get:
      tags:
        - Model Controller
      summary: Retrieve all classes based on the identifier of a field
      operationId: com.provoly.ref.model.ModelController_getByField
      parameters:
        - name: id
          in: path
          description: Field UUID
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OClassDetailsDto'
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - class_read
  /model/class/{id}/associations:
    get:
      tags:
        - Model Controller
      summary: Retrieve all usages of a class
      operationId: com.provoly.ref.model.ModelController_getClassAssociations
      parameters:
        - name: id
          in: path
          description: UUID of the class
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssociationsDto'
              examples:
                associationsClass:
                  description: The parameter usedElsewhere in the response body is a boolean used to indicate if the class is used in a private object.
                  value: |
                    {
                      "associations": [
                            {
                              "id": "2f021992-5fb0-42d3-9646-0affccb98101",
                              "name": "LINK",
                              "type": "LINK"
                            },
                            {
                              "id": "2f021992-5fb0-42d3-9646-0affccb98111",
                              "name": "Name of the namedquery",
                              "type": "NAMED_QUERY"
                            },
                            {
                              "id": "2f121992-5fb0-42d3-9646-0affccb98111",
                              "name": "Name of the dataset",
                              "type": "DATASET"
                            },
                            {
                              "id": "2f121992-5fb0-42d3-9646-0affccb98111",
                              "name": "Name of the abac_rule",
                              "type": "ABAC"
                            }
                      ],
                      "usedElsewhere": false
                    }
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - class_read
  /model/id/{classId}/metadata/id/{metadataDefId}:
    put:
      tags:
