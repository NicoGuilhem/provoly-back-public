  /datasets:
    post:
      tags:
        - Dataset Controller
      summary: Save a new dataset for a specific oClass
      description: |
        A dataset is a coherent, versioned (functionally) set of data belonging to the same class.
        Dataset could be CLOSED and will therefore have several versions, OPEN or MODIFIABLE.
      operationId: com.provoly.ref.dataset.DatasetController_addDataset
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetDto'
            examples:
              closedDataset:
                summary: Adding a closed dataset
                value: |
                  {
                    "id": "423b5c01-1816-41d4-b358-200000000010",
                    "name": "closed dataset",
                    "oClass": "991eb4b2-253c-4875-b708-8209fa5bfd51",
                    "type": "CLOSED"
                  }
              datasetWithMetadata:
                summary: Adding a closed dataset with metadata
                value: |
                  {
                    "id": "423b5c01-1816-41d4-b358-200000000010",
                    "name": "closed dataset",
                    "oClass": "991eb4b2-253c-4875-b708-8209fa5bfd51",
                    "type": "CLOSED",
                    "metadata": [
                      "value": "20",
                      "metadataDefId": "c18b19eb-0c2a-4877-a7cb-3603ba94cb1c"
                    ]
                  }
              datasetWithGroups:
                summary: Adding a closed dataset with groups
                value: |
                  {
                    "id": "423b5c01-1816-41d4-b358-200000000010",
                    "name": "closed dataset",
                    "oClass": "991eb4b2-253c-4875-b708-8209fa5bfd51",
                    "type": "CLOSED",
                    "groups": [
                      "ALL",
                      "test"
                    ]
                  }
              invalidDataset:
                summary: Adding an incorrect dataset (with invalid type)
                value: |
                  {
                    "id": "423b5c01-1816-41d4-b358-200000000010",
                    "name": "closed incorrect dataset",
                    "oClass": "991eb4b2-253c-4875-b708-8209fa5bfd51",
                    "type": "UNKNOWN",
                    "groups": "[group_test]"
                  }
      responses:
        "201":
          description: Created
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "409":
          description: Conflict
          content:
            application/json:
              examples:
                sameOClassName:
                  summary: Save dataset with wrong name
                  description: Occurs when you try to save a dataset that has the same name as its OClass
                  value: |
                    {
                      "application": "data-ref",
                      "code": "CONFLICT",
                      "message": "Name {{datasetName}} already exists for class {{oClassName}}"
                    }
      security:
        - oidc:
            - dataset_write
    put:
      tags:
        - Dataset Controller
      summary: Update a dataset based on its identifier
      description: You can only update the dataset name, description, metadata and groups, you cannot change its id, type or OClass.
      operationId: com.provoly.ref.dataset.DatasetController_update
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetDto'
            examples:
              dataset_update:
                summary: Updating a dataset name
                value: |
                  {
                    "id": "423b5c01-1816-41d4-b358-200000000010",
                    "name": "we change dataset name",
                    "oClass": "991eb4b2-253c-4875-b708-8209fa5bfd51",
                    "type": "CLOSED"
                  }
              group_update:
                summary: Update dataset groups
                description: |
                  Updating groups.
                  If you add an empty group list, the current groups in the dataset will be deleted.
                  If the group list is null, the dataset's current groups will not be modified.
                value: |
                  {
                    "id": "423b5c01-1816-41d4-b358-200000000010",
                    "name": "we change dataset name",
                    "oClass": "991eb4b2-253c-4875-b708-8209fa5bfd51",
                    "type": "CLOSED",
                    "groups": [
                      "AUTHENTICATED"
                    ]
                  }
      responses:
        "200":
          description: No Content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupErrors'
              examples:
                deleteGroupReferencedByDashboard:
                  summary: Delete group used by a dashboard
                  description: When groups are deleted from a dataset, a list of groups is returned if they were used by a dashboard.
                  value: |
                    { "missingGroupsByEntity": 
                      {
                        "dataset_id": ["group1"],
                        "dataset_id2": ["group1", "group2"]
                      }
                    }
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
          content:
            application/json:
              examples:
                changeType:
                  summary: Update dataset with different type
                  description: Occurs when you try to update a dataset with a different type
                  value: |
                    {
                      "application": "data-ref",
                      "code": "FORBIDDEN",
                      "message": "The dataset's type is immutable"
                    }
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - dataset_write
    get:
      tags:
        - Dataset Controller
      summary: Get all datasets
      operationId: com.provoly.ref.dataset.DatasetController_getAll
      responses:
        "201":
          description: Retrieve all datasets
          content:
            application/json:
              examples:
                getAllDatasets:
                  summary: Get all datasets
                  value: |
                    [
                      {
                        "id": "618af062-d722-43d2-8e4d-cb65d07230ac",
                        "name": "classification des sols",
                        "oClass": "9d37e039-272b-463e-942e-6c6af0c2f440",
                        "type": "CLOSED",
                        "metadata": []
                      }
                    ]
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
      security:
        - oidc:
            - dataset_read
