                    "oClass": "991eb4b2-253c-4875-b708-8209fa5bfd51",
                    "lastModified": "2023-04-27T13:56:13.861018Z",
                    "version": 3,
                    "state": "INACTIVE",
                    "withFile": false
                  }
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
          content:
            application/json:
              examples:
                idSaved:
                  summary: Create dataset version without unique id
                  description: Occurs when you try to create a dataset version of a closed dataset with an id already saved
                  value: |
                    {
                      "application": "data-ref",
                      "code": "BAD_REQUEST",
                      "message": "Dataset version {{datasetVersionId}} already exist."
                    }
                multipleVersionOnOpen:
                  summary: Create dataset version on an open dataset
                  description: Occurs when you try to create a second dataset version of an open dataset
                  value: |
                    {
                      "application": "data-ref",
                      "code": "BAD_REQUEST",
                      "message": "Dataset {{datasetId}} can't have more than one version."
                    }
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "409":
          description: Conflict
          content:
            application/json:
              examples:
                multipleOnClosedDataset:
                  summary: Create dataset version on a closed dataset
                  description: |
                    Occurs when you try to create a new dataset version on a closed dataset. This can also happen if you try to import data and an import is in progress on this dataset.
                  value: |
                    {
                      "application": "data-ref",
                      "code": "CONFLICT",
                      "message": "Can't override existing dataset {{datasetVersionId}} or have parallel imports"
                    }
      security:
        - oidc:
            - item_write
    put:
      tags:
        - Dataset Version Controller
      operationId: com.provoly.ref.dataset.DatasetVersionController_updateState
      summary: Update the state of a dataset version
      description: |
        A dataset version has multiple states to indicate the level of availability of the data imported.
        Each state can be modified to a specific set of other states. For example, if a dataset's state is `LOADING`,
        it can only obtain the `INDEXING` or `ERROR` states.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetVersionDto'
            examples:
              updateDatasetVersion:
                summary: Update dataset version
                value: |
                  {
                    "id": "b1a08d9d-4c38-4d43-90f3-25015537ebfd" ,
                    "dataset": "423b5c01-1816-41d4-b358-200000000010",
                    "oClass": "991eb4b2-253c-4875-b708-8209fa5bfd51",
                    "lastModified": "2023-04-27T13:56:13.861018Z",
                    "version": 1,
                    "state": "INACTIVE",
                    "withFile": false
                  }
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              examples:
                incompatibleStates:
                  summary: Wrong transition of state
                  description: Occurs when you try to update a dataset version's state to a state it can't transition to
                  value: |
                    {
                      "application": "data-ref",
                      "code": "BAD_REQUEST",
                      "message": "Dataset cannot transition from LOADING to ACTIVE"
                    }
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
          content:
            application/json:
              examples:
                differentDatasetId:
                  summary: Different dataset id
                  description: Occurs when you try to update a dataset version's state with a different dataset as the one in the database
                  value: |
                    {
                      "application": "data-ref",
                      "code": "FORBIDDEN",
                      "message": "Dataset versions are immutable"
                    }
        "409":
          description: Conflict
          content:
            application/json:
              examples:
                sameState:
                  summary: Update state with the actual state
                  description: Occurs when you try to update a dataset version's state with the same state it already is in
                  value: |
                    {
                      "application": "data-ref",
                      "code": "CONFLICT",
                      "message": "Dataset {{datasetId}} is already in state: {{datasetState}}"
                    }
      security:
        - oidc:
            - item_write
    get:
      tags:
        - Dataset Version Controller
      summary: Retrieve all dataset versions
      description: |
        A dataset version is an instantiation of a dataset. It allows us to have coherent and versioned class data. 
        The parameter hasWarnings in the response body is a boolean used to indicate if dataset-version import's generated some warnings.
