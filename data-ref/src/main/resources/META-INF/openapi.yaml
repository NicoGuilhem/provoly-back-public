                  predicate: 077e4ac8-7499-4489-bd5f-ac37d2ca226e
                  condition:
                    type: ATTRIBUTE
                    attribute: "f897dc76-9c4a-4b7a-9797-fc577c0438e9"
                    operator: EQUALS
                    value: "1234567890"
              composedAdd:
                summary: Adding a composed ABAC rule
                value:
                  id: 7ffcea67-2335-429f-888a-59121f522144
                  name: MyRule
                  type: ATTRIBUTE
                  predicate: 7ffcea67-2335-429f-888a-59121f522143
                  condition:
                    type: OR
                    composed:
                      - type: AND
                        composed:
                          - type: ATTRIBUTE
                            attribute: 9d82213c-db91-42db-8675-5f2e70ae2f05
                            value: "202000010265"
                          - type: ATTRIBUTE
                            attribute: dbf3917f-1af8-495e-94af-67d8315a7772
                            value: "3"
                      - type: ATTRIBUTE
                        attribute: 9d82213c-db91-42db-8675-5f2e70ae2f05
                        value: "202000010265"
                      - type: ATTRIBUTE
                        attribute: dbf3917f-1af8-495e-94af-67d8315a7772
                        value: "3"
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
          content:
            application/json:
              examples:
                differentOClass:
                  description: Different OClass in AND/OR condition
                  value:
                    application: data-ref
                    code: BAD_REQUEST
                    message: Attributes are not on same OClass
                differentTypes:
                  description: If the ABAC rule type is different from its condition type
                  value:
                    application: data-ref
                    code: BAD_REQUEST
                    message: RuleType ATTRIBUTE does not allowed Metadata condition
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "501":
          description: Unsupported Operation. In the case you try to add an ABAC rule with a condition we do not support.
          content:
            application/json:
              examples:
                unknownType:
