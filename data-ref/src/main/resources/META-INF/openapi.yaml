  schemas:
    MessageLevel:
      enum:
        - ERROR
        - WARNING
        - DELETING
        - DELETE
      type: string
    MessageDto:
      type: object
      properties:
        level:
          $ref: "#/components/schemas/MessageLevel"
        messages:
          type: array
          items:
            properties:
              level:
                $ref: "#/components/schemas/MessageLevel"
              extractedMessageCode:
                enum:
                  - UNRECOGNIZED
                  - MEDIA_TYPE
                  - FORMAT
                  - STORAGE
                  - NO_VALUES
                  - NO_ATTRIBUTES
              type:
                $ref: "#/components/schemas/Type"
              name:
                type: string
                example: "my rule"
              recordId:
                type: string
              datasetVersionId:
                $ref: "#/components/schemas/UUID"
              receivedValue:
                type: string
                example: "A value that cannot be formated to int"
        count: 
          type: integer
          minimum: 1
          maximum: 20
    Error:
      type: object
      properties:
        code:
          type: string
          example: 404
        message:
          type: string
          example: "Entity : ac2c1a7f-0694-4f03-bb00-d349adeecd3d inexistant."
      required:
        - code
        - message
    AbacRuleDto:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          example: "my rule"
        description:
          type: string
          example: "description of my rule"
        active:
          type: boolean
          example: true
          description: If abac rule is not active, then it will not be taken into account for restriction processes.
        predicate:
          $ref: '#/components/schemas/UUID'
        type:
          $ref: '#/components/schemas/AbacRuleType'
        condition:
          $ref: '#/components/schemas/ConditionDto'
    AbacRuleType:
      enum:
        - METADATA
        - ATTRIBUTE
      type: string
    Group:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          example: "ALL"
        system:
          type: boolean
          example: false
    GroupWrite:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          example: "ALL"
    AttributeDefDetailsDto:
      type: object
