                multipleOnClosedDataset:
                  summary: Create dataset version on a closed dataset
                  description: |
                    Occurs when you try to create a new dataset version on a closed dataset. This can also happen if you try to import data and an import is in progress on this dataset.
                  value:
                    application: "data-ref"
                    code: "CONFLICT"
                    message: "Can't override existing dataset {{datasetVersionId}} or have parallel imports"
      security:
        - oidc:
            - item_write
    get:
      tags:
        - Dataset Version
      summary: Retrieve all dataset versions
      description: |
        A dataset version is an instantiation of a dataset. It allows us to have coherent and versioned class data. 
        The parameter hasWarnings in the response body is a boolean used to indicate if dataset-version import's generated some warnings.
      operationId: com.provoly.ref.dataset.DatasetVersionController_getAll
      parameters:
        - name: limit
          in: query
          description: maximum number of elements to retrieve
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: "index of first element to retrieve (starting from the default value : 0)"
          required: false
          schema:
            type: integer
        - name: state
          in: query
          description: "State of the dataset version. Only datasets versions of this state are retrieved"
          required: false
          schema:
            $ref: '#/components/schemas/DatasetState'
        - name: dateMax
          in: query
          description: "maximum lastModified of dataset version. Only datasets version with lastModified before this date are retrieved."
          required: false
          schema:
            type: string
            format: date
            example: "2024-12-29"
        - name: dateMin
          in: query
          description: "minimum lastModified of dataset version. Only datasets versions with lastModified after this date are retrieved."
          required: false
          schema:
            type: string
            format: date
            example: "2018-01-15"
        - name: dataset
          in: query
          description: "UUID of the dataset. Only datasets versions of this dataset are retrieved"
          required: false
          schema:
            $ref: '#/components/schemas/UUID'
        - name: orderBy
          in: query
          description: "Data for ordering results."
          required: false
          schema:
            $ref: '#/components/schemas/DatasetVersionOrderBy'
        - name: sortBy
          in: query
          description: "Sorting order."
          required: false
          schema:
            $ref: '#/components/schemas/Direction'
      responses:
        "200":
          description: 'list of datasets versions'
          headers:
            X-Total-Count:
              description: 'Total count of all the elements of the request (without applying the limit parameter)'
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DatasetVersionDetailsDto'
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - dataset_read
  /dataset-versions/id/{id}:
    get:
      tags:
        - Dataset Version
      operationId: com.provoly.ref.dataset.DatasetVersionController_get
      summary: Retrieve a dataset version based on its identifier. It also returns its associated metadata.
      parameters:
        - name: id
          in: path
          description: dataset version UUID
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "200":
          $ref: '#/components/responses/datasetVersionDetailsDto'
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - dataset_read
            - search
    put:
      tags:
        - Dataset Version
      operationId: com.provoly.ref.dataset.DatasetVersionController_updateState
      summary: Update some informations of the dataset version
      parameters:
        - name: id
          in: path
          description: UUID of the dataset version to update
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      description: |
        Updating producer, production date and additional informations of the dataset version.
        The updated dataset version's is identified by its ID from path variable.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetVersionInformationDto'
            examples:
              updateDatasetVersion:
                summary: Update dataset version
                value:
                  productionDate: "2023-04-27T13:56:13.861018Z"
                  producer: "https://www.data.gouv.fr/fr/"
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              examples:
                incompatibleStates:
                  summary: Invalid informations in body.
                  description: |
                    Occurs when dataset type is 'CLOSED' and :
                     - you try to update a dataset version's without sending productionDate or producer.
                     - productionDate is after now.
                  value:
                    application: "data-ref"
                    code: "BAD_REQUEST"
                    message: "Dataset cannot transition from LOADING to ACTIVE"
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
          content:
            application/json:
              examples:
                differentDatasetId:
                  summary: Different dataset id
                  description: Occurs when you try to update a dataset version's state with a different dataset as the one in the database
                  value:
                    application: "data-ref"
                    code: "FORBIDDEN"
                    message: "Dataset versions are immutable"
        "409":
          description: Conflict
          content:
            application/json:
              examples:
                sameState:
                  summary: Update state with the actual state
                  description: Occurs when you try to update a dataset version's state with the same state it already is in
                  value:
                    application: "data-ref"
                    code: "CONFLICT"
                    message: "Dataset {{datasetId}} is already in state: {{datasetState}}"
      security:
        - oidc:
            - item_write
    delete:
      tags:
        - Dataset Version
      operationId: com.provoly.ref.dataset.DatasetVersionController_delete
      summary: Delete a dataset version based on its identifier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "204":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetVersionDto'
              examples:
                deletingDataset:
                  summary: Deleting dataset version
                  description: Return the dataset version currently deleting, this is an asynchrone operation.
                  value:
                    id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    dataset: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    oClass: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    lastModified: "2022-03-10T16:15:50Z"
                    version: 1
                    state: "DELETING"
                    fileName: "datas_flood.csv"
        "400":
          description: Bad Request
          content:
            application/json:
              examples:
                wrongState:
                  summary: Delete a version dataset in the wrong state
                  description: Occurs when you try to delete a dataset version in state INDEXING, LOADING, DELETING
                  value:
                    application: "data-ref"
                    code: "BAD_REQUEST"
                    message: "Unable to delete dataset version {{dataset_version_id}} because it's {{current_state}}"
        "401":
          description: Not Authorized
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - dataset_write
