  /users/me/dashboards:
    post:
      tags:
        - Dashboard
      summary: Save a new dashboard
      description: |
        Saves a dashboard for the current user. Groups can be added, otherwise the dashboard is private by default. If the group added is "ALL", then the dashboard can be consulted by anyone. If the group added is "AUTHENTICATED", then everyone will have the right to view the dashboard except the anonymous user.
        A list of missing groups is returned when the list of groups added to the dashboard does not match those present in the datasets, and the dashboard is not created.
      operationId: com.provoly.ref.dashboard.DashboardController_saveDashboard
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardWriteDto'
            examples:
              default:
                summary: Adding a dashboard
                value:
                  id: "f4f77417-0f5b-4d8e-9bde-a8dcf799632f"
                  name: "dashboard example"
                  image: "image"
                  description: "description du widget"
                  cover: true
                  datasource: [ "aeab3b25-ebae-4878-b96d-0d4ced5a4ab7" ]
                  manifest:
                    windows:
                      - widgets:
                          - type: "map"
                            layout:
                              x: 1
                              y: 1
                              height: 2
                              width: 3
                            options:
                              style: "osm-bright"
                              fit: true
                              layers:
                                - type: "bubble"
                                  locationAttribute: "location"
                                  intensityAttribute: "integer"
                                  radiusFactor: 0.005
                            resultSet: "rs1"
                          - type: "map"
                            layout:
                              x: 4
                              y: 1
                              height: 2
                              width: 3
                            options:
                              style: "osm-bright"
                              fit: true
                              layers:
                                - type: "heatmap"
                                  locationAttribute: "location"
                                  intensityAttribute: "integer"
                                  intensityAsc: true
                            resultSet: "rs1"
                          - type: "table"
                            layout:
                              x: 1
                              y: 3
                              height: 5
                              width: 10
                            options": { }
                            resultSet: "rs1"
                      - widgets:
                          - type: "map"
                            layout:
                              x: 1
                              y: 1
                              height: 7
                              width: 6
                            options:
                              style: "osm-bright"
                              fit: true
                              layers:
                                - type: "heatmap"
                                  locationAttribute: "location"
                                  intensityAttribute: "integer"
                                  intensityAsc: true
                            resultSet: "rs1"
                  metadata:
                    - metadataDefId: "ba691f33-fe70-42f8-a277-05c607ba29cf"
                      value: "50"
                    - metadataDefId: "ba691f33-fe70-42f8-a277-05c607ba28cf"
                      value: "30"
                  accessRightsByGroup:
                    "ALL": [ "READ" ]
                    "a_group": [ "READ", "WRITE" ]
                  additionalInformation: "Some more information"
      responses:
        "201":
          description: Dashboard created or updated. It return groups missing to match those in the datasource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupErrors'
              example:
                missingGroupsByEntity:
                  "f12cef0c-6204-4e09-9807-2da6a9c0e6d0": [ "group1" ]
                  "f12cef0c-6204-4e09-9807-2da6a9c0e6d1": [ "group1", "group2" ]
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
