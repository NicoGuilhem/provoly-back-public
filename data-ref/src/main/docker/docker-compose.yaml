  db01:
    image: postgres:16.1-alpine
    container_name: db01
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=quarkus
      - POSTGRES_PASSWORD=quarkus
      - POSTGRES_DB=default
    networks:
      - provoly

  ref01:
    image: quarkus/data-ref-jvm-dirty
    container_name: ref01
    ports:
      - "8180:8180"
    networks:
      - provoly

volumes:
  data-es-01:
    driver: local

networks:
  provoly: