name: provoly-back
title: Provoly backend
version: true
nav:
  - modules/ROOT/nav.adoc
ext:
  collector:
    - run:
        - command: npx @redocly/cli@latest build-docs --output=generated/data-ref.html data-ref/src/main/resources/META-INF/openapi.yaml
        - command: npx @redocly/cli@latest build-docs --output=generated/data-virt.html data-virt/src/main/resources/META-INF/openapi.yaml
        - command: npx @redocly/cli@latest build-docs --output=generated/provoly-exec.html provoly-exec/provoly-exec-engine/src/main/resources/META-INF/openapi.yaml
        - command: npx @redocly/cli@latest build-docs --output=generated/provoly-transfo.html provoly-transfo/provoly-transfo-engine/src/main/resources/META-INF/openapi.yaml
    - scan:
        dir: generated/
        files: "**/*.html"
        into: modules/ROOT/attachments