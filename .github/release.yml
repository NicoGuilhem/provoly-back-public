changelog:
  categories:
    - title: 🛠️ Fixes
      labels:
        - bug
        - fix
    - title: 🚀 Features
      labels:
        - enhancement
        - feature
        - FEATURE
    - title: 💣 Breaking changes
      labels:
        - "breaking change"
    - title: 📘 Documentation
      labels:
        - documentation
    - title: 📦 Dependencies upgrades
      labels:
        - dependencies
    - title: 🦄 Others
      labels:
        - "*"
      exclude:
        labels:
          - bug
          - fix
          - enhancement
          - feature
          - FEATURE
          - "breaking change"
          - dependencies
          - documentation
