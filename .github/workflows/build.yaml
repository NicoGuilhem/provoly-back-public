name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths-ignore:
      - '.gitignore'
      - 'LICENSE'
      - '*.adoc'
      - '*.txt'
      - 'docs'
      - 'ide-config'
      - '.github/**'
  pull_request:
    paths-ignore:
      - '.gitignore'
      - 'LICENSE'
      - '*.adoc'
      - 'docs'
      - 'ide-config'
      - '*.txt'
      - '.github/**'

env:
  JAVA_VERSION: 21
  MAVEN_OPTS: "-Dorg.slf4j.simpleLogger.showDateTime=true -Djansi.force=true"
  MAVEN_CLI_OPTS: "-Dstyle.color=always --batch-mode --errors --show-version -DinstallAtEnd=true -Dno-format -DdeployAtEnd=true -Dquarkus.container-image.tag=latest"
  DOCKER_IMAGE_ADDITIONAL_TAGS: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: provoly-runner
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '2'

      #PREPARE RUNNER
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.CI_REGISTRY_SERVER }}
          username: ${{ secrets.CI_REGISTRY_USER }}
          password: ${{ secrets.CI_REGISTRY_PASSWORD }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.1
      - name: Cache local Maven repository
        uses: actions/cache@v4
        id: cache-maven
        with:
          path: ~/.m2/repository
          key: provoly-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            provoly-maven-

      # RUN SPOTLESS
      - name: Run Spotless
        id: spotless
        run: mvn $MAVEN_CLI_OPTS -Dvalidate compile


      # CHECK AND BUILD REF IF NEEDED
      - name: Check Ref modification
        id: changed-ref-files
        uses: tj-actions/changed-files@v43
        with:
          # Avoid using single or double quotes for multiline patterns
          files: |
            data-ref/**
            provoly-common/**/*
            provoly-common-test/**/*
            provoly-parent/**/*
            provoly-parent-build-quarkus/**/*

      # RUN SCRIPT TO GET TARGETED PROJECTS
      # FOR MAIN ONLY, push image on repository
      - name: Sets env vars for main branch
        id: main-branch
        run: |
          echo "CI_SHORT_COMMIT_SHA=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_ENV
          echo "DOCKER_IMAGE_ADDITIONAL_TAGS=dev-$CI_SHORT_COMMIT_SHA,latest" >> $GITHUB_ENV
          echo "MAVEN_CLI_OPTS=-Dstyle.color=always --batch-mode --errors --show-version -DinstallAtEnd=true -DdeployAtEnd=true -Dquarkus.container-image.additional-tags=$DOCKER_IMAGE_ADDITIONAL_TAGS -Dquarkus.container-image.labels.\"git-ref\"=${{ github.sha }} -DskipTests" >> $GITHUB_ENV
          echo "MAVEN_PROFILE=-Pdocker-image" >> $GITHUB_ENV
        if: github.ref == 'refs/heads/main'

      - name: Build Ref
        id: ref-build
        run: mvn ${{ env.MAVEN_CLI_OPTS }} verify -pl data-ref -am -Pdocker-image
        if: steps.changed-ref-files.outputs.any_changed == 'true'
        env:
          CI_REGISTRY_PASSWORD: ${{ secrets.CI_REGISTRY_PASSWORD }}
          CI_REGISTRY_SERVER: ${{ vars.CI_REGISTRY_SERVER }}
          CI_REGISTRY_USER: ${{ secrets.CI_REGISTRY_USER }}
          CI_REGISTRY_PROJECT_NAME: provoly

      #  CHECK AND BUILD REQUIRED MODULES
      - name: Detect Changes
        uses: jbangdev/jbang-action@v0.115.0
        with:
          script: ./ci/scripts/CiScripts.java
          scriptargs: select-target-modules --merge_request=${{ github.event.pull_request.base.sha }}
            --mr-diff-base-sha=${{ github.event.pull_request.base.sha }}
            --mr-source-branch-name=${{ github.head_ref }}
            --mr-target-branch-name=${{ github.base_ref }}
            --commit-sha=${{ github.sha }}

      - name: Output changes
        run: echo "$(cat build.env)" >> $GITHUB_ENV

      - name: Build Modules
        id: modules-build
        run: mvn ${{ env.MAVEN_CLI_OPTS }} verify -pl ${{ env.MODULES }} -am ${{ env.MAVEN_PROFILE }}
        env:
          CI_REGISTRY_PASSWORD: ${{ secrets.CI_REGISTRY_PASSWORD }}
          CI_REGISTRY_SERVER: ${{ vars.CI_REGISTRY_SERVER }}
          CI_REGISTRY_USER: ${{ secrets.CI_REGISTRY_USER }}
          CI_REGISTRY_PROJECT_NAME: provoly

      - name: Summary
        if: always()
        run: |
          echo "# Steps status " >> $GITHUB_STEP_SUMMARY
          echo "| Step | State |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Setting up runner | ${{ steps.cache-maven.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Running for main | ${{ github.ref == 'refs/heads/main' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Spotless | ${{ steps.spotless.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build data-ref | ${{ steps.id.ref-build.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| changed modules |  ${{ env.MODULES }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build modules | ${{ steps.modules-build.outcome }} |" >> $GITHUB_STEP_SUMMARY