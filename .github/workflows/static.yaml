name: Static analysis

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 21
  MAVEN_OPTS: "-Dorg.slf4j.simpleLogger.showDateTime=true -Djansi.force=true"
  MAVEN_CLI_OPTS: "-Dstyle.color=always --batch-mode --errors --show-version -DinstallAtEnd=true -Dno-format -DdeployAtEnd=true"

jobs:
  generate-coverage:
    name: Generate Coverage
    runs-on: provoly-runner
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Login to Harbor
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Get latest CVE version
        run: curl https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json -o known_exploited_vulnerabilities.json

      - name: Cache local Maven repository
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
        id: cache-maven
        with:
          path: ~/.m2/repository
          key: provoly-maven-${{ hashFiles('**/pom.xml') }}-${{ hashFiles('known_exploited_vulnerabilities.json') }}
          restore-keys: |
            provoly-maven-${{ hashFiles('**/pom.xml') }}-${{ hashFiles('known_exploited_vulnerabilities.json') }}
            provoly-maven-${{ hashFiles('**/pom.xml') }}
            provoly-maven-

      - name: Check cve and generate report
        id: cve
        run: mvn ${{ env.MAVEN_CLI_OPTS }} -P cve org.owasp:dependency-check-maven:8.1.2:aggregate

      - name: Generate Coverage
        run: |
          mvn ${{ env.MAVEN_CLI_OPTS }} -Dmaven.test.failure.ignore=true verify

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: ${{ github.workspace }}/*/target

      - name: Summary
        if: always()
        run: |
          echo "# Steps status " >> $GITHUB_STEP_SUMMARY
          echo "| Step | State |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Setting up runner | ${{ steps.cache-maven.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CVE's | ${{ steps.cve.outcome }} |" >> $GITHUB_STEP_SUMMARY

  sonar:
    needs: generate-coverage
    name: Sonar
    runs-on: provoly-arc-runner-on-rancher
    steps:
      - uses: actions/checkout@v4

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: provoly-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            provoly-maven-

      - name: Download coverage files
        uses: actions/download-artifact@v4
        with:
          name: code-coverage-report
          path: ${{ github.workspace }}

      - name: Run sonar analysis
        id: sonar
        env:
          SONAR_URL: ${{ vars.SONAR_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:3.9.1.2184:sonar \
            -Dsonar.host.url=${{ env.SONAR_URL }}\
            -Dsonar.token=${{ env.SONAR_TOKEN }}\
            -Dsonar.projectKey=provoly-back \
            -Dsonar.dependencyCheck.jsonReportPath=${{ github.workspace }}/target/dependency-check-report.json\
            -Dsonar.dependencyCheck.htmlReportPath=${{ github.workspace }}/target/dependency-check-report.html\
            -Dsonar.coverage.jacoco.xmlReportPaths=${{ github.workspace }}/target/**/coverage/jacoco.xml

      - name: Summary
        if: always()
        run: |
          echo "| Sonar |  ${{ steps.sonar.outcome }} |" >> $GITHUB_STEP_SUMMARY
