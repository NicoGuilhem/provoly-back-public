name: Tag

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

env:
  PROJECT_LIST: "data-ref,data-virt,data-link,data-replay,provoly-exec/provoly-exec-engine,provoly-exec/provoly-exec-file-provision,provoly-exec/provoly-exec-data-outcome,provoly-transfo/provoly-transfo-common,provoly-transfo/provoly-transfo-engine,provoly-transfo/provoly-transfo-runner"
  MAVEN_CLI_OPTS: "-Dstyle.color=always --batch-mode --errors --show-version -DinstallAtEnd=true -DdeployAtEnd=true"
  JAVA_VERSION: 21

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Tag
    runs-on: provoly-runner
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      #PREPARE RUNNER
      - name: Login to Harbor
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up JDK
        uses: actions/setup-java@b36c23c0d998641eff861008f374ee103c25ac73 # v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'
      - name: Set up Maven
        uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1 # v5
        with:
          maven-version: 3.9.1
      - name: Cache local Maven repository
        uses: actions/cache@6849a6489940f00c2f30c0fb92c6274307ccb58a # v4
        id: cache-maven
        with:
          path: ~/.m2/repository
          key: provoly-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            provoly-maven-

      - name: Tag
        id: push-tag
        run: mvn ${{ env.MAVEN_CLI_OPTS }} -pl ${{ env.PROJECT_LIST }} -Dquarkus.container-image.tag=${{ github.ref_name }} -Dquarkus.container-image.labels.\"git-ref\"=${{ github.sha }} -DskipTests verify -am -Pdocker-image
        env:
          CI_REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          CI_REGISTRY_SERVER: ${{ vars.REGISTRY_URL }}
          CI_REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          CI_REGISTRY_PROJECT_NAME: provoly

      - name: Summary
        if: always()
        run: |
          echo "# Steps status " >> $GITHUB_STEP_SUMMARY
          echo "| Step | State |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Pushing tag to repository | ${{ steps.push-tag.outcome }} |" >> $GITHUB_STEP_SUMMARY