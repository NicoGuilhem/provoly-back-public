name: Tag

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Tag
    runs-on: provoly-runner
    steps:
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Tag
        id: ref-build
        run: mvn -Dstyle.color=always --batch-mode --errors --show-version -DinstallAtEnd=true -DdeployAtEnd=true -Dquarkus.container-image.tag=${{ github.ref }} -Dquarkus.container-image.labels.\"git-ref\"=${{ github.sha }} -DskipTests verify -am -Pdocker-image
        if: steps.changed-ref-files.outputs.any_changed == 'true'
        env:
          CI_REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          CI_REGISTRY_SERVER: ${{ vars.REGISTRY_URL }}
          CI_REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          CI_REGISTRY_PROJECT_NAME: provoly




      - name: Summary
        if: always()
        run: |
          echo "# Steps status " >> $GITHUB_STEP_SUMMARY
          echo "| Step | State |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Pushing tag to repository | ${{ steps.push-tag.outcome }} |" >> $GITHUB_STEP_SUMMARY