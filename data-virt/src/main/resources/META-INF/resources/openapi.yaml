  /data-sources/values:
    post:
      summary: Get distinct values on attribute column where value match a requested value
      description: |
        This endpoint is used to retrieve a list of possible values for an attribute in a datasource.
        The datasource available for this endpoint are Dataset and DatasetVersion
      tags:
        - Data Source Controller
      operationId: com.provoly.virt.datasource.DataSourceController_searchForAttributeValues
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/Search'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              examples:
                result:
                  summary: List of values
                  value: |
                    [
                      "marie", "marianne", "marin"
                    ]
        "400":
          description: Bad Request
          content:
            application/json:
              examples:
                noAttributeId:
                  summary: No attributeId provided
                  value: |
                    {
                      "application": "data-virt",
                      "code": "BAD_REQUEST",
                      "message": "You need to provide an attributeId of the class"
                    }
        "401":
          description: Not Authorized
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - datasource_read
