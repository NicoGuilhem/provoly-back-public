    post:
      summary: Proxy for getting items from dataset, dataset version or named query.
      description: |
        Get 200 items from data source.
        
        It is possible to search on one or more classes.
        On Mono class search, it returns items from all active datasets. It's possible to specify
        dataset versions ids. 200 items are returned. This limit can be adjusted,
        but cannot exceed 1000. Items can be sorted. Works only with a Mono Class search. If a sort is
        set, then the next page of results can be retrieved by specifying the \"searchAfter\" 
        value of the first search result.
        This property has a ttl: once the time has elapsed, you'll have to restart the search from the beginning.
        It's also possible to add one or more filters in query parameters and sort your results.
      tags:
        - Data Source Controller
      operationId: com.provoly.virt.datasource.DataSourceController_getItemsSearch
      parameters:
        - name: dataSourceId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
        - $ref: '#/components/parameters/filterDto'
        - $ref: '#/components/parameters/sortString'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                excludeGeo:
                  $ref: '#/components/parameters/excludeGeo'
                type:
                  $ref: '#/components/schemas/SearchRequestType'
                fullSearch:
                  $ref: '#/components/schemas/FullSearchConditionDto'
              oneOf:
                - $ref: '#/components/schemas/MonoClassRequestDto'
                - $ref: '#/components/schemas/MultiClassRequestDto'
            examples:
              monoWithoutCondition:
                summary: Mono request without condition
                description: Returns items from oclass oclass_id_1.
                value: |
                  {
                      "type":"MONO_CLASS",
                      "oClass": "oclass_id_1"
                  }
              monoWithDatasetVersions:
                summary: Mono request with datasetVersionIds
                description: Returns items from oclass oclass_id_1 only in dataset_version_id
                value: |
                  {
                      "type":"MONO_CLASS",
                      "oClass": "oclass_id_1",
                      "datasetVersionIds": ["dataset_version_id"]
                  }
              monoSimpleCondition:
                summary: Mono request with condition
                description: |
                  Returns items from oclass 
                  oclass_id_1 that match attribute_id_1 condition.
                value: |
                  {
                    "type": "MONO_CLASS",
                    "oClass": "oclass_id_1",
                    "condition": {
                      "type": "ATTRIBUTE",
                      "attribute": "attribute_id_1",
                      "operator": "EQUALS",
                      "value": "Avant"
                    }
                  }
              monoSimpleConditionWithSearchAfter:
                summary: Mono request with condition and searchAfter
                description: |
                  Returns items from oclass 
                  oclass_id_1 that match attribute_id_1 condition.
                value: |
                  {
                    "type": "MONO_CLASS",
                    "oClass": "oclass_id_1",
                    "condition": {
                      "type": "ATTRIBUTE",
                      "attribute": "attribute_id_1",
                      "operator": "EQUALS",
                      "value": "Avant"
                    },
                     "searchAfter":"search_after_value"
                  }
              monoOrComposedCondition:
                summary: Mono request with composed condition
                description: |
                  Returns items from oclass 
                  oclass_id_1 that match attribute_id_1 OR attribute_id_2 conditions.
                value: |
                  {
                    "type": "MONO_CLASS",
                    "oClass": "oclass_id_1",
                    "condition": {
                      "type": "OR",
                      "composed": [
                        {
                          "type": "ATTRIBUTE",
                          "attribute": "attribute_id_1",
                          "operator": "INSIDE",
                          "value": 2020,
                          "upperValue" : 2023
                        },
                        {
                          "type": "ATTRIBUTE",
                          "attribute": "attribute_id_2",
                          "operator": "GREATER_THAN",
                          "value": "2020"
                        }
                      ]
                    }
                  }
              multiWithFieldsAndClass:
                summary: Multi request with field condition
                description: |
                  Returns items from oclasses 
                  oclass_id_1 and oclass_id_2 that match field_id_1 AND field_id_2 condition. 
                  Default operator is EQUALS.
                value: |
                  {
                    "type": "MULTI_CLASS",
                    "multiType": "AND",
                    "oClasses": [ "oclass_id_1", "oclass_id_2"],
                    "fields": [
                      {
                        "field": "field_id_1",
                        "value": "2020"
                      },
                      {
                        "field": "field_id_2",
                        "value": "2022"
                      }
                    ]
                  }
              multiWithFieldsAllClass:
                summary: Multi request with field condition on all class
                description: |
                  Returns items from all oclasses that match field_id_1 OR field_id_2 condition. 
                  Default operator is EQUALS.
                value: |
                  {
                   "type": "MULTI_CLASS",
                   "multiType": "OR",
                   "oClasses": [],
                   "fields": [
                     {
                       "field": "field_id_1",
                       "value": "2020"
                     },
                     {
                       "field": "field_id_2",
                       "value": "2022"
                     }
                   ]
                  }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemsSearchResultDto'
              examples:
                itemSearchResult:
                  summary: Item search result
                  value: |
                    {
                      "items": {
                        "oclass_id_1": [
                          {
                            "oClass": "oclass_id_1",
                            "id": "dataset_version_id_1@item_id_1",
                            "metadata": {
                              "_insertion_date": "2023-06-27T07:14:00.228606022",
                              "datasetdef_id": "dataset_id_1",
                              "_dataset_id": "dataset_version_id_1",
                              "_item_id": "dataset_version_id_1@item_id_1",
                              "_class": "oclass_id_1"
                            },
                            "attributes": {
                              "Classification": {
                                "value": "Conifères",
                                "type": "VALUE",
                                "metadata": {},
                                "visible": true
                              },
                              "Pourcentage surface": {
                                "value": "6.82",
                                "type": "VALUE",
                                "metadata": {},
                                "visible": true
                              },
                              "Année": {
                                "value": "2020",
                                "type": "VALUE",
                                "metadata": {},
                                "visible": true
                              }
                            },
                            "datasetId": "dataset_version_id_1",
                            "itemId": "item_id_1"
                          },
                          {
                            "oClass": "oclass_id_1",
                            "id": "dataset_version_id_1@item_id_1",
                            "metadata": {
                              "_insertion_date": "2023-06-27T07:14:00.228606022",
                              "datasetdef_id": "dataset_id_1",
                              "_dataset_id": "dataset_version_id_1",
                              "_item_id": "dataset_version_id_1@item_id_1",
                              "_class": "oclass_id_1"
                            },
                            "attributes": {
                              "Classification": {
                                "value": "Conifères",
                                "type": "VALUE",
                                "metadata": {},
                                "visible": true
                              },
                              "Pourcentage surface": {
                                "value": "6.66",
                                "type": "VALUE",
                                "metadata": {},
                                "visible": true
                              },
                              "Année": {
                                "value": "2021",
                                "type": "VALUE",
                                "metadata": {},
                                "visible": true
                              }
                            },
                            "datasetId": "dataset_version_id_1",
                            "itemId": "item_id_1"
                          }
                        ]
                      },
                      "relations": [],
                      "count": {
                        "oclass_id_1": {
                          "count": 115,
                          "accurate": true
                        }
                      },
                      "searchAfter": null
                    }
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - search
            - datasource_read
  /data-sources/id/{dataSourceId}/items/aggregate:
    get:
      summary: Get aggregated results from dataset, dataset version or named query.
      description: |
        Named query must reference a mono class request. Only aggregatedBy is required.
        The default operation is count.
      tags:
        - Data Source Controller
      operationId: com.provoly.virt.datasource.DataSourceController_getItemsAggregate
      parameters:
        - name: dataSourceId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
        - name: aggregatedBy
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
          example: tree_AttributeId
        - name: dateInterval
          in: query
          schema:
            $ref: '#/components/schemas/DateInterval'
          examples:
            default:
              value: "null"
            groupByAndSum:
              value: "null"
            interval:
              value: "null"
        - $ref: '#/components/parameters/filterDto'
        - name: groupBy
          in: query
          schema:
            $ref: '#/components/schemas/UUID'
          examples:
            default:
              value: "null"
            groupByAndSum:
              value: year_AttributeId
            interval:
              value: "null"
        - name: interval
          in: query
          schema:
            format: double
            type: number
          examples:
            default:
              value: "null"
            groupByAndSum:
              value: "null"
            interval:
              value: 10
        - name: operation
          in: query
          schema:
            $ref: '#/components/schemas/AggregateOperation'
          examples:
            default:
              value: count
            groupByAndSum:
              value: sum
            interval:
              value: sum
        - $ref: '#/components/parameters/sortAggregate'
        - name: valueField
          in: query
          schema:
            $ref: '#/components/schemas/UUID'
          examples:
            default:
              value: "null"
            groupByAndSum:
              value: area_attributeId
            interval:
              value: area_AttributeId
        - $ref: '#/components/parameters/excludeGeo'
        - $ref: '#/components/parameters/limit'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AggregationResultDto'
              examples:
                default:
                  description: aggregation with only aggregatedBy. Return the count of each trees.
                  value: |
                    { 
                      "operation": "count",
                      "values": [
                        {
                          "key": "coniferes",
                          "value": 4
                        },
                        {
                          "key": "feuillus",
                           "value": 8
                        }
                      ]
                    }
                interval:
                  summary: With interval
                  description: Returns the sum of occupied areas in intervals of 10
                  value : |
                    {
                      "operation": "count",
                      "values": [
                        {
                          "key": 0.0,
                          "value": 51
                        },
                        {
                          "key": 10.0,
                          "value": 5
                        },
                        {
                          "key": 20.0,
                          "value": 5
                        }
                      ]
                    }
                groupBy:
                  summary: With group By
                  description: Returns for each tree the sum of its occupied area grouped by year.
                  value: |
                    { 
                    "operation": "sum",
                    "values": [
                      {
                        "key": "coniferes",
                        "groupBy": [
                          {
                            "key": 2018,
                            "value": 3783.4
                          },
                          {
                            "key": 2019,
                            "value": 3256.18
                          }
                        ]
                      },
                      {
                        "key": "feuillus",
                        "groupBy": [
                          {
                            "key": 2018,
                            "value": 2798.82
                          },
                          {
                            "key": 2019,
                            "value": 2999.87
                          }
                        ]
                      }
                    ]}
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AggregationResultDto'
              examples:
                badNumericType:
                  summary: Non-numeric attribute
                  value: |
                    {
                      "application": "data-virt",
                      "code": "BAD_REQUEST",
                      "message": "It's not possible to aggregate on the non-numeric attribute {{attribute}} which has type keyword"
                    }
                badDateType:
                  summary: Bad attribute type
                  value: |
                    {
                      "application": "data-virt",
                      "code": "BAD_REQUEST",
                      "message": "Aggregating on date is unavailable for attribute {{attribute}} that is not a date."
                    }
                invalidSortAndGroupBy:
                  summary: Sort with groupBy
                  value: |
                    {
                      "application": "data-virt",
                      "code": "BAD_REQUEST",
                      "message": "Sort is not available when a groupBy has been set" 
                    }
                invalidDateInterval:
                  summary: Wrong DateInterval value
                  value: |
                    {
                      "application": "data-virt",
                      "code": "BAD_REQUEST",
                      "message": "{{dateInterval}} is not a valid DateInterval value"
                    }
                invalidAggregatedBy:
                  summary: Wrong AggregateBy type
                  value: |
                    {
                      "application": "data-virt",
                      "code": "BAD_REQUEST",
                      "message": "Aggregate by is not available for types STRING, RAW, or GEO type"
                    }
      security:
        - oidc:
            - search
            - datasource_read
