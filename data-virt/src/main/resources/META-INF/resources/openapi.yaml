      operationId: com.provoly.virt.dataset.DatasetController_importData
      parameters:
        - name: datasetId
          in: path
          description: Dataset id
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
        - name: id
          in: path
          description: Dataset version id that will be created
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/ItemDto'
            example : |
              [
                {
                  "id": "{{datasetId}}@item_id",
                  "oClass": "oclass_id",
                  "metadata": {},
                  "attributes": {
                    "Adresse": {
                        "type": "VALUE",
                        "metadata": {},
                        "value": "2 rue toto 30000 Nîmes",
                        "visible": false
                    },
                    "Nb place disponibles": {
                        "type": "VALUE",
                        "metadata": {},
                        "value": 5,
                        "visible": false
                    }
                  }
                }
              ]
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
          content:
            application/json:
              examples:
                mismatchOclassId:
                  summary: Oclass id doesn't match dataset
                  value: |
                    {
                      "application": "data-virt",
                      "code": "BAD_REQUEST",
                      "message": "Item {{item_id}} cannot be added due to different OClassId with its Dataset"
                    }
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
          content:
            application/json:
              examples:
                noClosedDataset:
                  summary: Import on non closed dataset
                  value: |
                    {
                      "application": "data-virt",
                      "code": "FORBIDDEN",
                      "message": "Import is only allowed on closed dataset"
                    }
                idNotMatch:
                  summary: ItemId mismatch with datasetId
                  value: |
                    {
                      "application": "data-virt",
                      "code": "FORBIDDEN",
                      "message": "Item id {{item_id}} doesn't match dataset id {{dataset_id}}"
                    }
        "404":
          $ref: '#/components/responses/notFoundException'
        "409":
          description: Insertion
      security:
        - oidc:
            - item_write
