                  default: false
                chunkSize:
                  type: integer
                  example: 12
          application/shp:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                normalizeGeo:
                  type: boolean
                  default: false
                chunkSize:
                  type: integer
                  example: 12
