  /imports/dataset/id/{datasetId}:
    post:
      tags:
        - Imports
      summary: Asynchronous data import
      description: |
        Asynchronous data import that support csv file and zipped shapefile. It returns the
        created dataset version for dataset.
        NormalizeGeo is used to specify whether a shapefile should be normalized. For example, if a shapefile contains a polygon and a multi-polygon, set this property to true.
        ChunkSize is used to specify the number of items per chunk that data-virt will hold in memory during import.
      operationId: com.provoly.virt.importFile.ImportsController_importNewDataset
      parameters:
        - name: datasetId
          in: path
          description: Dataset id
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      requestBody:
        content:
          text/csv:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                normalizeGeo:
                  type: boolean
                  default: false
                chunkSize:
                  type: integer
                  example: 12
                datasetVersionInformation:
                  $ref: '#/components/schemas/DatasetVersionInformationDto'
          application/shp:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                normalizeGeo:
                  type: boolean
                  default: false
                chunkSize:
                  type: integer
                  example: 12
                datasetVersionInformation:
                  $ref: '#/components/schemas/DatasetVersionInformationDto'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetVersionDetailsDto'
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - item_write
