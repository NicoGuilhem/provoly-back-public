---
openapi: 3.0.3
info:
  title: Virtualize API
  x-logo:
    url: ../provoly-back/main/_images/provoly.png
    backgroundColor: "#FFFFFF"
    altText: "Provoly logo"
  description: |
    \"Moving\" data access, Virtualizes data access to underlying persistence engines.
  version: 0.9.0
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  contact:
    url: ../provoly-back/main/index.html
servers:
  - url: http://localhost:8080
    description: No sandbox environment as of now
paths:
  /about/version:
    get:
      summary: Return current version of data virt
      tags:
        - Version
      operationId: com.provoly.version.VersionController_getVersion
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
              examples:
                nominal:
                  summary: Nominal response
                  value:
                    applicationVersion: 0.4.8"
                    chartVersion: 0.4.8

  /data-sources/id/{dataSourceId}:
    get:
      summary: Proxy for getting dataset, dataset version or a named query from its id.
      tags:
        - Data Source
      operationId: com.provoly.virt.datasource.DataSourceController_getDataSourceDetail
      parameters:
        - name: dataSourceId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataSourceDetailsDto'
              examples:
                datasetVersion:
                  summary: Get dataset version
                  value:
                    id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                    type: DATASET_VERSION
                    oClass: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                namedQuery:
                  summary: Get named query
                  value:
                    id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    type: "SEARCH"
                    oClass: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                dataset:
                  summary: Get dataset
                  value:
                    id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    type: "DATASET"
                    oClass: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - search
            - datasource_read
