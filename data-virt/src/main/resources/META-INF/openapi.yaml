    post:
      summary: Proxy for getting items from dataset, dataset version or named query.
      description: |
        Get 200 items from data source.
        
        It is possible to search on one or more classes.
        On Mono class search, it returns items from all active datasets. It's possible to specify
        dataset versions ids. 200 items are returned. This limit can be adjusted,
        but cannot exceed 1000. Items can be sorted. Works only with a Mono Class search. If a sort is
        set, then the next page of results can be retrieved by specifying the \"searchAfter\" 
        value of the first search result.
        This property has a ttl: once the time has elapsed, you'll have to restart the search from the beginning.
        It's also possible to add one or more filters in query parameters and sort your results.
      tags:
        - Data Source
      operationId: com.provoly.virt.datasource.DataSourceController_getItemsSearch
      parameters:
        - name: dataSourceId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
        - $ref: '#/components/parameters/filterDto'
        - $ref: '#/components/parameters/sortString'
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/MonoClassRequestDto'
              - $ref: '#/components/schemas/MultiClassRequestDto'
              discriminator:
                propertyName: type
                mapping:
                  MONO_CLASS: '#/components/schemas/MonoClassRequestDto'
                  MULTI_CLASS: '#/components/schemas/MultiClassRequestDto'
            examples:
              monoWithoutCondition:
                summary: Mono request without condition
                description: Returns items from oclass oclass_id_1.
                value:
                  type: MONO_CLASS
                  oClass: "23fee6a5-5edc-4b37-a74c-47d8022e81b4"
              monoWithDatasetVersions:
                summary: Mono request with datasetVersionIds
                description: Returns items from oclass oclass_id_1 only in dataset_version_id
                value:
                  type: MONO_CLASS
                  oClass: "23fee6a5-5edc-4b37-a74c-47d8022e81b4"
                  datasetVersionIds:
                    - "23fee6a5-5edc-4b37-a74c-47d8022e81b4"
              monoSimpleCondition:
                summary: Mono request with condition
                description: |
                  Returns items from oclass 
                  oclass_id_1 that match attribute_id_1 condition.
                value:
                  type: MONO_CLASS
                  oClass: "23fee6a5-5edc-4b37-a74c-47d8022e81b4"
                  condition:
                    type: ATTRIBUTE
                    value: "Avant"
                    upperValue: "upperValue"
                    attribute: "23fee6a5-5edc-4b37-a74c-47d8022e81b4"
                    location: "location"
                    operator: EQUALS
                  sort:
                    attribute: "53915c05-64cd-4be9-86a6-4c5c326920ed"
                    direction: "asc"
                    type: ATTRIBUTE
                  searchAfter: null
              monoSimpleConditionWithSearchAfter:
                summary: Mono request with condition and searchAfter
                description: |
                  Returns items from oclass 
                  oclass_id_1 that match attribute_id_1 condition.
                value:
                  type: MONO_CLASS
                  oClass: "23fee6a5-5edc-4b37-a74c-47d8022e81b4"
                  condition:
                    type: ATTRIBUTE
                    attribute: "53915c05-64cd-4be9-86a6-4c5c326920ed"
                    operator: EQUALS
                    value: Avant
                  searchAfter: search_after_value
              monoOrComposedCondition:
                summary: Mono request with composed condition
                description: |
                  Returns items from oclass 
                  oclass_id_1 that match attribute_id_1 OR attribute_id_2 conditions.
                value:
                  type: MONO_CLASS
                  oClass: "53915c05-64cd-4be9-86a6-4c5c326920ed"
                  condition:
                    type: OR
                    composed:
                      - type: ATTRIBUTE
                        attribute: "53915c05-64cd-4be9-86a6-4c5c326920ed"
                        operator: INSIDE
                        value: 2020
                        upperValue: 2023
                      - type: ATTRIBUTE
                        attribute: "53915c05-64cd-4be9-86a6-4c5c326920ed"
                        operator: GREATER_THAN
                        value: '2020'
              multiWithFieldsAndClass:
                summary: Multi request with field condition
                description: |
                  Returns items from oclasses 
                  oclass_id_1 and oclass_id_2 that match field_id_1 AND field_id_2 condition. 
                  Default operator is EQUALS.
                value:
                  type: MULTI_CLASS
                  multiType: AND
                  oClasses:
                    - "7e16273c-63f0-4f56-98a5-958574595aad"
                    - "c7d7a979-4491-4c9d-be90-d49b879b03ed"
                  fields:
                    - field: "c93e60f4-67e9-4154-846b-43122918a712"
                      value: '2020'
                    - field: "0c91ae2a-a5bf-4011-9c72-12b835ea97ad"
                      value: '2022'
              multiWithFieldsAllClass:
                summary: Multi request with field condition on all class
                description: |
                  Returns items from all oclasses that match field_id_1 OR field_id_2 condition. 
                  Default operator is EQUALS.
                value:
                  type: MULTI_CLASS
                  multiType: OR
                  oClasses: [ ]
                  fields:
                    - field: "c93e60f4-67e9-4154-846b-43122918a712"
                      value: '2020'
                    - field: "0c91ae2a-a5bf-4011-9c72-12b835ea97ad"
                      value: '2022'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemsSearchResultDto'
              examples:
                itemSearchResult:
                  summary: Item search result
                  value:
                    items:
                      "cdc75747-26b3-4dc7-990c-189028d7a882":
                        - oClass: "cdc75747-26b3-4dc7-990c-189028d7a882"
                          id: "7ebf0872-bfe8-418a-b7cc-32b32d9e57fa@ba306efd-0bf7-4844-b067-8a4eb0d546c7"
                          metadata:
                            _insertion_date: "2023-06-27T07:14:00.228606022"
