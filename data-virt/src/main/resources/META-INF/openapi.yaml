                            _dataset_id: "7ebf0872-bfe8-418a-b7cc-32b32d9e57fa"
                            _item_id: "7ebf0872-bfe8-418a-b7cc-32b32d9e57fa@ba306efd-0bf7-4844-b067-8a4eb0d546c7"
                            _class: "cdc75747-26b3-4dc7-990c-189028d7a882"
                          attributes:
                            Classification:
                              value: Conifères
                              type: VALUE
                              metadata: { }
                              visible: true
                            Pourcentage surface:
                              value: '6.82'
                              type: VALUE
                              metadata: { }
                              visible: true
                            Année:
                              value: '2020'
