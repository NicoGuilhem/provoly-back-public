  /data-sources/id/{dataSourceId}/items/aggregate:
    get:
      summary: Get aggregated results from dataset, dataset version or named query.
      description: |
        Named query must reference a mono class request. Only aggregatedBy is required.
        The default operation is count.
      tags:
        - Data Source
      operationId: com.provoly.virt.datasource.DataSourceController_getItemsAggregate
      parameters:
        - name: dataSourceId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
        - name: aggregatedBy
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
          example: tree_AttributeId
        - name: dateInterval
          in: query
          schema:
            $ref: '#/components/schemas/DateInterval'
          examples:
            default:
              value: "null"
            groupByAndSum:
              value: "null"
            interval:
              value: "null"
        - $ref: '#/components/parameters/filterDto'
        - name: groupBy
          in: query
          schema:
            $ref: '#/components/schemas/UUID'
          examples:
            default:
              value: "null"
            groupByAndSum:
              value: year_AttributeId
            interval:
              value: "null"
        - name: interval
          in: query
          schema:
            format: double
            type: number
          examples:
            default:
              value: "null"
            groupByAndSum:
              value: "null"
            interval:
              value: 10
        - name: operation
          in: query
          schema:
            $ref: '#/components/schemas/AggregateOperation'
          examples:
            default:
              value: count
            groupByAndSum:
              value: sum
            interval:
              value: sum
        - $ref: '#/components/parameters/sortAggregate'
        - name: valueField
          in: query
          schema:
            $ref: '#/components/schemas/UUID'
          examples:
            default:
              value: "null"
            groupByAndSum:
              value: area_attributeId
            interval:
              value: area_AttributeId
        - $ref: '#/components/parameters/excludeGeo'
        - $ref: '#/components/parameters/limit'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AggregationResultDto'
              examples:
                default:
                  description: aggregation with only aggregatedBy. Return the count of each trees.
                  value:
                    operation: count
                    values:
                      - key: coniferes
                        value: 4
                      - key: feuillus
                        value: 8
                interval:
                  summary: With interval
                  description: Returns the sum of occupied areas in intervals of 10
                  value:
                    operation: count
                    values:
                      - key: 0
                        value: 51
                      - key: 10
                        value: 5
                      - key: 20
                        value: 5
                groupBy:
                  summary: With group By
                  description: Returns for each tree the sum of its occupied area grouped by year.
                  value:
                    operation: sum
                    values:
                      - key: coniferes
                        groupBy:
                          - key: 2018
                            value: "3783.4"
                          - key: 2019
                            value: "3256.18"
                      - key: feuillus
                        groupBy:
                          - key: 2018
                            value: "2798.82"
                          - key: 2019
                            value: 2999.87
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
        "404":
          $ref: '#/components/responses/notFoundException'
        "400":
          description: Bad Request
          content:
            application/json:
              examples:
                badNumericType:
                  summary: Non-numeric attribute
                  value:
                    application: data-virt
                    code: BAD_REQUEST
                    message: It's not possible to aggregate on the non-numeric attribute {{attribute}} which has type keyword
                badDateType:
                  summary: Bad attribute type
                  value:
                    application: data-virt
                    code: BAD_REQUEST
                    message: Aggregating on date is unavailable for attribute {{attribute}} that is not a date.
                invalidSortAndGroupBy:
                  summary: Sort with groupBy
                  value:
                    application: data-virt
                    code: BAD_REQUEST
                    message: Sort is not available when a groupBy has been set
                invalidDateInterval:
                  summary: Wrong DateInterval value
                  value:
                    application: data-virt
                    code: BAD_REQUEST
                    message: "{{dateInterval}} is not a valid DateInterval value"
                invalidAggregatedBy:
                  summary: Wrong AggregateBy type
                  value:
                    application: data-virt
                    code: BAD_REQUEST
                    message: Aggregate by is not available for types STRING, RAW, or GEO type
      security:
        - oidc:
            - search
            - datasource_read
  /data-sources/values:
    post:
      summary: Get distinct values on attribute column where value match a requested value
      description: |
        This endpoint is used to retrieve a list of possible values for an attribute in a datasource.
        The datasource available for this endpoint are Dataset and DatasetVersion
      tags:
        - Data Source
      operationId: com.provoly.virt.datasource.DataSourceController_searchForAttributeValues
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/Search'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              examples:
                result:
                  summary: List of values
                  value:
                    [
                      "marie", "marianne", "marin"
                    ]
        "400":
          description: Bad Request
          content:
            application/json:
              examples:
                noAttributeId:
                  summary: No attributeId provided
                  value:
                    application: data-virt
                    code: BAD_REQUEST
                    message: You need to provide an attributeId of the class
        "401":
          description: Not Authorized
        "404":
          $ref: '#/components/responses/notFoundException'
      security:
        - oidc:
            - datasource_read
  /datasets/id/{datasetId}/dataset-versions/id/{id}:
    post:
      tags:
        - Dataset
      summary: Trigger asynchronous items insertion
      description: Import data by adding ItemDto list directly in a new version of a closed dataset
      operationId: com.provoly.virt.dataset.DatasetController_importData
      parameters:
        - name: datasetId
          in: path
          description: Dataset id
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
        - name: id
          in: path
          description: Dataset version id that will be created
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/ItemDto'
            example:
              - oClass: "4c20ec9d-ff2d-405b-9d59-e8153b05c560"
                id: "f320a245-bfe8-476b-ad85-b700bf92b2b0@e787d244-a871-42db-b5bd-81caa2328990"
                metadata:
                  _insertion_date: '2023-06-27T07:14:00.228606022'
                  datasetdef_id: "f320a245-bfe8-476b-ad85-b700bf92b2b0"
                  _dataset_id: "e787d244-a871-42db-b5bd-81caa2328990"
                  _item_id: "f320a245-bfe8-476b-ad85-b700bf92b2b0@e787d244-a871-42db-b5bd-81caa2328990"
                  _class: "06a7a9ef-811e-4c83-923c-5204dc5b95af"
                attributes:
                  Classification:
                    value: Conifères
                    type: VALUE
                    metadata: {}
                    visible: true
                  Pourcentage surface:
                    value: '6.82'
                    type: VALUE
                    metadata: {}
                    visible: true
                  Année:
                    value: '2020'
                    type: VALUE
                    metadata: {}
                    visible: true
                itemId: "765dada9-0f13-4b17-839c-56e2d8467ff9"
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
          content:
            application/json:
              examples:
                mismatchOclassId:
                  summary: Oclass id doesn't match dataset
                  value:
                    application: data-virt
                    code: BAD_REQUEST
                    message: Item {{item_id}} cannot be added due to different OClassId with its Dataset
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
          content:
            application/json:
              examples:
                noClosedDataset:
                  summary: Import on non closed dataset
                  value:
                    application: data-virt
                    code: FORBIDDEN
                    message: Import is only allowed on closed dataset
                idNotMatch:
                  summary: ItemId mismatch with datasetId
                  value:
                    application: data-virt
                    code: FORBIDDEN
                    message: Item id {{item_id}} doesn't match dataset id {{dataset_id}}
        "404":
          $ref: '#/components/responses/notFoundException'
        "409":
          description: Insertion
      security:
        - oidc:
            - item_write
  /file:
    post:
      tags:
        - File
      summary: Upload file
      description: Save file which will be linked to an item
      operationId: com.provoly.virt.file.FileController_receiveFile
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                filename:
                  type: string
                  description: |
                    Name of the file (unique identifier).
                    If filename is not sent, file identifier is generated with random UUID (returned is response).
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
                description: the file identifier (same as filename from request body if sent)
                example: "generated_file_id"
        "400":
          description: Bad Request
          content:
            application/json:
              examples:
                missingFile:
                  summary: Missing file
                  value:
                    application: data-virt
