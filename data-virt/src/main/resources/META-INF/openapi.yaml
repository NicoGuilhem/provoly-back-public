  /relations:
    post:
      tags:
        - Relations
      summary: Save a list of relations
      description: |
        Registers a relation between two attributes of different oClasses 
        to link items of these oClasses. It creates a new item in the `relation` index in elasticsearch.
        The relationType must first be registered in `data-ref` service.
      operationId: com.provoly.virt.relation.RelationsController_saveRelations
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/RelationDto'
      responses:
        "201":
          description: Created
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
      security:
        - oidc:
            - item_write
    delete:
      tags:
        - Relations
      summary: Delete relation between two attributes
      description: Deleting a relation implies the dissociation between items linked by the relation.
      operationId: com.provoly.virt.relation.RelationsController_delete
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelationDto'
      responses:
        "204":
          description: No Content
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
      security:
        - oidc:
            - item_write
  /relations/aggregate:
    post:
      tags:
        - Relation Aggregate
      summary: Update relations between items. Called by `data-link`
      description: |
        Data Link automatically analyze which relation is deprecated, 
        and update them by calling this endpoint with the `aggregateId` and the `link` which is the
         id of the attribute on which to delete and remake the relation.
      operationId: com.provoly.virt.relation.RelationAggregateController_updateAggregate
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/RelationsAggregateDto'
      responses:
        "201":
          description: Created
        "401":
          description: Not Authorized
        "403":
          description: Not Allowed
      security:
        - oidc:
            - update_relation_aggregate
components:
  responses:
    notFoundException:
      description: Entity not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  parameters:
    limit:
      in: query
      name: limit
      schema:
        $ref: '#/components/schemas/Limit'
    sortString:
      in: query
      name: order
      schema:
        description: Query parameters usage to SortDto.
        type: object
        properties:
          sortById:
            type: boolean
            example: false
          attribute:
            $ref: '#/components/schemas/UUID'
          direction:
            $ref: '#/components/schemas/Direction'
          type:
            $ref: '#/components/schemas/SortType'
        pattern: '{{is_sort_id}},{{attribute_id}},{{direction}},{{SORT_TYPE}}'
        example:
          - "uuid,desc,METADATA"
          - "true,asc"
    sortAggregate:
      in: query
      name: order
      schema:
        description: Query parameter usage to SortAggregate.
        type: object
        properties:
          direction:
            $ref: '#/components/schemas/Direction'
          orderBy:
            $ref: '#/components/schemas/OrderBy'
    excludeGeo:
      in: query
      name: excludeGeo
      schema:
        $ref: '#/components/schemas/ExcludeGeo'
    withSourceItems:
      in: query
      name: withSourceItems
      schema:
        $ref: '#/components/schemas/WithSourceItems'
    withDestinationItems:
      in: query
      name: withDestinationItems
      schema:
        $ref: '#/components/schemas/WithDestinationItems'
    filterDto:
      in: query
      name: filter
      schema:
        description: |
          Query parameter usage of FilterDto. 
          The upperValue is necessary only with operator that accept it such as INSIDE and OUTSIDE.
        type: string
        pattern: '{{attribute_id}},{{OPERATOR}},{{value}},{{upperValue}}'
        example:
          - 'uuid,INSIDE,2020,2022'
  schemas:
    ExcludeGeo:
      description: Parameter to exclude geographic data from queries.
      type: boolean
      default: true
    Limit:
      format: int32
      type: integer
      default: 200
      maximum: 1000
      example: 10
    WithSourceItems:
      description: Parameter to include source items from relations in search result.
      type: boolean
      default: false
    WithDestinationItems:
      description: Parameter to include destination items from relations in search result.
      type: boolean
      default: false
    Error:
      type: object
      properties:
        code:
          type: string
          example: 404
        message:
          type: string
          example: "Entity : ac2c1a7f-0694-4f03-bb00-d349adeecd3d inexistant."
      required:
        - code
        - message
    AggregateOperation:
      enum:
        - count
        - max
        - min
        - avg
        - sum
        - cardinality
        - median
        - q1
        - q3
        - extent
      type: string
    AggregationResultDto:
      type: object
      properties:
        operation:
          $ref: '#/components/schemas/AggregateOperation'
        values:
          type: array
          items:
            $ref: '#/components/schemas/ItemAggregationDto'
    AttributeDto:
      oneOf:
        - $ref: "#/components/schemas/AttributeSimpleValueDto"
        - $ref: "#/components/schemas/AttributeMultiValueDto"
      discriminator:
        propertyName: type
        mapping:
          VALUE: "#/components/schemas/AttributeSimpleValueDto"
          MULTI: "#/components/schemas/AttributeMultiValueDto"
    AttributeSimpleValueDto:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/AttributeType'
        metadata:
          type: object
          additionalProperties:
            type: object
        value:
          $ref: "#/components/schemas/anyType"
        visible:
          type: boolean
          default: false
    anyType:
      anyOf:
        - type: string
        - type: number
          format: double
        - type: integer
          format: int32
        - type: boolean
        - type: array
          items: {}
        - type: object
    AttributeMultiValueDto:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/AttributeType'
        values:
          type: array
          items:
            $ref: "#/components/schemas/AttributeSimpleValueDto"
    AttributeType:
      enum:
        - VALUE
        - MULTI
      type: string
    ConditionDto:
      oneOf:
        - $ref: "#/components/schemas/AttributeConditionDto"
        - $ref: "#/components/schemas/MetadataConditionDto"
        - $ref: "#/components/schemas/ComposedConditionDto"
        - $ref: "#/components/schemas/TrueConditionDto"
      discriminator:
        propertyName: type
        mapping:
          ATTRIBUTE: "#/components/schemas/AttributeConditionDto"
          OR: "#/components/schemas/ComposedConditionDto"
          AND: "#/components/schemas/ComposedConditionDto"
          METADATA: "#/components/schemas/MetadataConditionDto"
          TRUE: "#/components/schemas/TrueConditionDto"
    TrueConditionDto:
      description: Condition based on attribute used when params type equals ATTRIBUTE
      type: object
      properties:
        type:
          $ref: "#/components/schemas/ConditionType"    
    ConditionType:
      enum:
        - "TRUE"
        - OR
        - AND
        - ATTRIBUTE
        - METADATA
      type: string
    AttributeConditionDto:
      description: Condition based on attribute used when params type equals ATTRIBUTE
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ConditionType'
        attribute:
          $ref: '#/components/schemas/UUID'
        value:
          type: string
        upperValue:
          title: string
        location:
          type: string
        operator:
          $ref: "#/components/schemas/Operator"
    ComposedConditionDto:
      description: Composed condition based on ConditionDto used when params type equals OR or AND. ConditionDto can again be one of TRUE, AND, OR, ATTRIBUTE or METADATA.
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ConditionType'
        composed:
          type: array
          properties:
            items:
              $ref: '#/components/schemas/ConditionDto'
    MetadataConditionDto:
      description: Condition based on metadata used when params type equals METADATA
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ConditionType'
        metadata:
          $ref: '#/components/schemas/UUID'
        value:
          type: string
        operator:
          $ref: "#/components/schemas/Operator"
    DataSourceDetailsDto:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        type:
          $ref: '#/components/schemas/DataSourceType'
        oClass:
